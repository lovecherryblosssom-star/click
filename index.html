<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
 <style>
        body{
            background-color:beige;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        button{
            height: 100px;
            width: 300px;
            border-radius: 20px;
            border: transparent;
            font-size: 40px;
            position: relative;
            cursor: pointer;
        }
        button::before {
    content: "";
    width: 320px;
    height: 120px;
    background-color: cornsilk;
    border-radius: 20px;
    position: absolute;
    top: -9px;
    left: -9px;
    background-image: conic-gradient(rgb(185, 42, 185), rgb(201, 82, 102), cyan, lightgreen, lightyellow);
    z-index: -1;
}
    </style>
<body>
   <button class="button">Click Here</button>
</body>
</html>
