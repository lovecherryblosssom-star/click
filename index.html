<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background-color: #fff4e6;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s ease;
        }
        body.dark {
            background-color: #1a1a2e;
        }
        button {
            height: 100px;
            width: 300px;
            border-radius: 20px;
            border: none;
            background-color: white;
            color: black;
            font-size: 40px;
            position: relative;
            cursor: pointer;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        body.dark button {
            background-color: #2d2d44;
            color: white;
        }
        button::before {
            content: "";
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 30px;
            background-image: conic-gradient(orange, deeppink, purple, dodgerblue, orange);
            z-index: -1;
            /* Added transition so the glow dims smoothly */
            transition: opacity 0.3s ease;
        }
        
        /* Targets the glow effect specifically in dark mode */
        body.dark button::before {
            opacity: 0.4; /* Adjust this number (0.0 to 1.0) to make it brighter or dimmer */
        }
    </style>
</head>
<body>
    <button class="button" onclick="document.body.classList.toggle('dark')">Click Here</button>
</body>
</html>
