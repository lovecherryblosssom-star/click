<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background-color: #fff4e6;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s ease;
        }
        body.dark {
            background-color: #1a1a2e;
        }
        button {
            height: 100px;
            width: 300px;
            border-radius: 20px;
            border: none;
            background-color: white;
            font-size: 40px;
            position: relative;
            cursor: pointer;
        }
        button::before {
            content: "";
            width: 320px;
            height: 120px;
            border-radius: 20px;
            position: absolute;
            top: -9px;
            left: -9px;
            background-image: conic-gradient(orange, deeppink, purple, dodgerblue, orange);
            z-index: -1;
        }
    </style>
</head>
<body>
    <button class="button" onclick="document.body.classList.toggle('dark')">Click Here</button>
</body>
</html>
